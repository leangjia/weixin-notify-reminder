version: '3.8'

services:
  rohs-monitor:
    build: .
    container_name: rohs-monitor
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Shanghai
      - PORT=3000
      - WECHAT_WEBHOOK_KEY=${WECHAT_WEBHOOK_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
